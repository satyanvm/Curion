  <path class="arrow" d="M1660 1250 L1770 1285" />
  <path class="arrow" d="M1660 1250 L1770 1415" />
  <path class="arrow-dashed" d="M1660 1250 L1770 1540" />
  <path class="arrow" d="M1920 1212 C1920 1500, 1600 1560, 1600 1605" />
  <path class="arrow" d="M1920 1340 C1920 1510, 1540 1560, 1540 1605" />
  <path class="arrow" d="M1920 1470 C1920 1520, 1490 1565, 1490 1605" />
</svg>
