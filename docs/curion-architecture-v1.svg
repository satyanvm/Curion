<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1820" viewBox="0 0 2200 1820" role="img" aria-labelledby="title desc">
  <title id="title">Curion Full Project Architecture Version 1</title>
  <desc id="desc">A black and white architecture diagram showing Curion's shipped extension/backend runtime and its separate local Playwright extraction pipeline.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#111111" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: none; stroke: #111111; stroke-width: 2; }
      .sectionbox { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #f4f4f4; stroke: #111111; stroke-width: 1.5; }
      .backend { fill: #ffffff; stroke: #111111; stroke-width: 2.4; filter: url(#shadow); }
      .diamond { fill: #ffffff; stroke: #111111; stroke-width: 2.1; filter: url(#shadow); }
      .planned { fill: #ffffff; stroke: #111111; stroke-width: 1.8; stroke-dasharray: 10 8; }
      .title { font: 700 36px "Helvetica Neue", Arial, sans-serif; fill: #111111; }
      .subtitle { font: 500 17px "Helvetica Neue", Arial, sans-serif; fill: #333333; }
      .section { font: 700 14px "Helvetica Neue", Arial, sans-serif; fill: #111111; letter-spacing: 1.2px; text-transform: uppercase; }
      .head { font: 700 24px "Helvetica Neue", Arial, sans-serif; fill: #111111; }
      .subhead { font: 700 18px "Helvetica Neue", Arial, sans-serif; fill: #111111; }
      .body { font: 500 15px "Helvetica Neue", Arial, sans-serif; fill: #222222; }
      .small { font: 500 12px "Helvetica Neue", Arial, sans-serif; fill: #444444; }
      .label { font: 700 12px "Helvetica Neue", Arial, sans-serif; fill: #111111; letter-spacing: 0.7px; text-transform: uppercase; }
      .arrow { fill: none; stroke: #111111; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-dashed { fill: none; stroke: #111111; stroke-width: 2.5; stroke-dasharray: 10 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1820" />
  <rect class="frame" x="28" y="28" width="2144" height="1764" rx="20" ry="20" />

  <text class="title" x="70" y="84">Curion Architecture - Full Project View V1</text>
  <text class="subtitle" x="70" y="116">The repo currently contains two different pipelines: the shipped extension/backend runtime and a separate local Playwright extraction pipeline.</text>

  <rect class="soft" x="70" y="142" rx="16" ry="16" width="1260" height="54" />
  <text class="small" x="92" y="165">
    <tspan x="92" dy="0">Important repo reality: the production extension does not use DOM-repair or vision extraction.</tspan>
    <tspan x="92" dy="16">Those branches exist only in the older local <tspan font-style="italic">src/</tspan> extraction pipeline, and vision is still not implemented.</tspan>
  </text>

  <text class="section" x="70" y="235">A. Shipped Extension and Backend Runtime</text>
  <rect class="sectionbox" x="50" y="255" rx="22" ry="22" width="2100" height="760" />

  <rect class="box" x="90" y="320" rx="22" ry="22" width="250" height="120" />
  <text class="head" x="118" y="365">User + Form Page</text>
  <text class="body" x="118" y="395">
    <tspan x="118" dy="0">A user opens a live form page</tspan>
    <tspan x="118" dy="20">and Curion is triggered.</tspan>
  </text>

  <rect class="box" x="390" y="300" rx="22" ry="22" width="330" height="160" />
  <text class="head" x="418" y="345">Content Script</text>
  <text class="body" x="418" y="375">
    <tspan x="418" dy="0">The extension extracts visible controls,</tspan>
    <tspan x="418" dy="20">labels, selectors, title, URL, and page HTML.</tspan>
  </text>
  <rect class="soft" x="418" y="402" rx="12" ry="12" width="274" height="34" />
  <text class="small" x="434" y="423">This is the production browser-side snapshot.</text>

  <rect class="box" x="770" y="300" rx="22" ry="22" width="320" height="160" />
  <text class="head" x="798" y="345">Metadata Source</text>
  <text class="body" x="798" y="375">
    <tspan x="798" dy="0">Saved profile mode sends a user ID.</tspan>
    <tspan x="798" dy="20">Working JSON mode sends a transient profile payload.</tspan>
  </text>

  <rect class="backend" x="1140" y="285" rx="24" ry="24" width="620" height="570" />
  <text class="section" x="1168" y="320">Backend Decision Plane</text>

  <rect class="box" x="1170" y="340" rx="18" ry="18" width="560" height="82" />
  <text class="subhead" x="1194" y="372">1. Mapping API Entry</text>
  <text class="body" x="1194" y="395">
    <tspan x="1194" dy="0">The production runtime sends everything to <tspan font-style="italic">/api/agent/map-form</tspan>.</tspan>
  </text>

  <rect class="box" x="1170" y="445" rx="18" ry="18" width="560" height="102" />
  <text class="subhead" x="1194" y="477">2. Sanitize Fields + Score Extraction</text>
  <text class="body" x="1194" y="500">
    <tspan x="1194" dy="0">The backend calculates extraction confidence for reporting and later trust decisions.</tspan>
  </text>
  <rect class="soft" x="1194" y="514" rx="12" ry="12" width="512" height="18" />
  <text class="small" x="1206" y="527">This path does not branch into DOM repair or vision.</text>

  <rect class="box" x="1170" y="570" rx="18" ry="18" width="560" height="112" />
  <text class="subhead" x="1194" y="602">3. Build Queries + Load Profile Atoms</text>
  <text class="body" x="1194" y="625">
    <tspan x="1194" dy="0">Field embeddings are created, then profile atoms come either from Supabase or from the transient profile object.</tspan>
  </text>

  <rect class="box" x="1170" y="705" rx="18" ry="18" width="560" height="90" />
  <text class="subhead" x="1194" y="737">4. Semantic Matching Runs First</text>
  <text class="body" x="1194" y="760">
    <tspan x="1194" dy="0">Semantic matching always runs before any Gemini fallback is considered.</tspan>
  </text>

  <polygon class="diamond" points="1450,820 1580,930 1450,1040 1320,930" />
  <text class="subhead" x="1381" y="920">Low-confidence or</text>
  <text class="subhead" x="1370" y="945">unmapped result?</text>
  <text class="small" x="1376" y="973">
    <tspan x="1376" dy="0">Fallback is triggered when mappings</tspan>
    <tspan x="1376" dy="16">stay weak or overall confidence drops.</tspan>
  </text>

  <rect class="box" x="1820" y="335" rx="22" ry="22" width="280" height="120" />
  <text class="head" x="1848" y="380">Supabase Atoms</text>
  <text class="body" x="1848" y="410">
    <tspan x="1848" dy="0">The persistent profile store</tspan>
    <tspan x="1848" dy="20">holds semantic atoms per user.</tspan>
  </text>

  <rect class="box" x="1820" y="540" rx="22" ry="22" width="280" height="120" />
  <text class="head" x="1848" y="585">Gemini Fallback</text>
  <text class="body" x="1848" y="615">
    <tspan x="1848" dy="0">Gemini is used only after semantic</tspan>
    <tspan x="1848" dy="20">matching fails trust checks.</tspan>
  </text>

  <rect class="box" x="1820" y="735" rx="22" ry="22" width="280" height="110" />
  <text class="head" x="1848" y="780">Return Mappings</text>
  <text class="body" x="1848" y="810">
    <tspan x="1848" dy="0">The backend returns mappings,</tspan>
    <tspan x="1848" dy="20">confidence, and review flags.</tspan>
  </text>

  <rect class="box" x="1820" y="900" rx="22" ry="22" width="280" height="90" />
  <text class="head" x="1848" y="935">Fill + Review</text>
  <text class="body" x="1848" y="960">
    <tspan x="1848" dy="0">The extension fills the DOM and may directly submit.</tspan>
  </text>

  <rect class="box" x="90" y="610" rx="22" ry="22" width="300" height="110" />
  <text class="head" x="118" y="655">Options Save Profile</text>
  <text class="body" x="118" y="685">
    <tspan x="118" dy="0">Saving profile data starts the ingest pipeline.</tspan>
  </text>

  <rect class="box" x="440" y="610" rx="22" ry="22" width="300" height="110" />
  <text class="head" x="468" y="655">Profile Ingest API</text>
  <text class="body" x="468" y="685">
    <tspan x="468" dy="0">Profiles are flattened into atoms and embedded structurally.</tspan>
  </text>

  <path class="arrow" d="M340 380 L390 380" />
  <path class="arrow" d="M720 380 L770 380" />
  <path class="arrow" d="M1090 380 L1140 380" />
  <path class="arrow" d="M1450 855 L1450 820" />
  <path class="arrow" d="M1760 625 C1790 625, 1790 600, 1820 600" />
  <path class="arrow" d="M1580 930 L1820 790" />
  <path class="arrow" d="M1450 1040 L1450 930" />
  <path class="arrow" d="M1820 790 L1820 790" />
  <path class="arrow" d="M2100 790 L2100 790" />
  <path class="arrow" d="M2100 845 L2100 900" />
  <path class="arrow" d="M390 665 L440 665" />
  <path class="arrow" d="M740 665 C1190 665, 1650 395, 1820 395" />
  <path class="arrow" d="M1820 395 C1775 395, 1760 610, 1730 625" />
  <path class="arrow" d="M1450 930 L1820 790" />
  <path class="arrow-dashed" d="M1580 930 C1710 930, 1750 650, 1820 600" />
  <text class="label" x="1600" y="910">Yes</text>
  <text class="label" x="1392" y="870">No</text>

  <text class="section" x="70" y="1070">B. Local Playwright Extraction Pipeline in <tspan font-style="italic">src/</tspan></text>
  <rect class="sectionbox" x="50" y="1090" rx="22" ry="22" width="2100" height="660" />

  <rect class="box" x="90" y="1160" rx="22" ry="22" width="260" height="110" />
  <text class="head" x="118" y="1205">Playwright Page</text>
  <text class="body" x="118" y="1235">
    <tspan x="118" dy="0">The local CLI opens demo pages or target pages.</tspan>
  </text>

  <rect class="box" x="390" y="1160" rx="22" ry="22" width="260" height="110" />
  <text class="head" x="418" y="1205">extractFields()</text>
  <text class="body" x="418" y="1235">
    <tspan x="418" dy="0">Raw DOM fields are collected from the page.</tspan>
  </text>

  <rect class="box" x="690" y="1140" rx="22" ry="22" width="320" height="130" />
  <text class="head" x="718" y="1185">calculateExtractionConfidence()</text>
  <text class="body" x="718" y="1215">
    <tspan x="718" dy="0">The local pipeline checks whether extraction looks strong enough to trust.</tspan>
  </text>

  <rect class="box" x="1050" y="1140" rx="22" ry="22" width="320" height="130" />
  <text class="head" x="1078" y="1185">calculateHtmlAdequacy()</text>
  <text class="body" x="1078" y="1215">
    <tspan x="1078" dy="0">HTML structure is scored to choose the next extraction fallback.</tspan>
  </text>

  <polygon class="diamond" points="1520,1135 1660,1250 1520,1365 1380,1250" />
  <text class="subhead" x="1455" y="1235">Recommended</text>
  <text class="subhead" x="1474" y="1260">fallback?</text>

  <rect class="box" x="1770" y="1120" rx="22" ry="22" width="300" height="92" />
  <text class="head" x="1798" y="1160">none</text>
  <text class="body" x="1798" y="1188">
    <tspan x="1798" dy="0">Use the DOM fields directly.</tspan>
  </text>

  <rect class="box" x="1770" y="1230" rx="22" ry="22" width="300" height="110" />
  <text class="head" x="1798" y="1270">dom-repair</text>
  <text class="body" x="1798" y="1298">
    <tspan x="1798" dy="0">Run repairDomFields(), then</tspan>
    <tspan x="1798" dy="20">recalculate confidence and adequacy.</tspan>
  </text>

  <rect class="box" x="1770" y="1360" rx="22" ry="22" width="300" height="110" />
  <text class="head" x="1798" y="1400">llm-html</text>
  <text class="body" x="1798" y="1428">
    <tspan x="1798" dy="0">Today this becomes dom+llm-deferred,</tspan>
    <tspan x="1798" dy="20">not an active extraction rewrite.</tspan>
  </text>

  <rect class="planned" x="1770" y="1490" rx="22" ry="22" width="300" height="100" />
  <text class="head" x="1798" y="1530">vision</text>
  <text class="body" x="1798" y="1558">
    <tspan x="1798" dy="0">The code marks vision as needed,</tspan>
    <tspan x="1798" dy="20">but no vision extractor exists yet.</tspan>
  </text>

  <rect class="box" x="1010" y="1605" rx="22" ry="22" width="700" height="110" />
  <text class="head" x="1038" y="1648">Resulting Field Set Goes to the Same Mapping API</text>
  <text class="body" x="1038" y="1678">
    <tspan x="1038" dy="0">The local CLI ultimately sends whichever field set it has into the same backend /api/agent/map-form pipeline used by the extension.</tspan>
  </text>

  <rect class="soft" x="90" y="1310" rx="16" ry="16" width="840" height="120" />
  <text class="small" x="112" y="1335">
    <tspan x="112" dy="0">Important repo nuance:</tspan>
    <tspan x="112" dy="18">extractFieldsWithLLM() exists in code, but the current extractFormFields() helper returns the dom+llm-deferred path before that extractor runs.</tspan>
    <tspan x="112" dy="18">The deferredLlmExtraction flag is passed around in scenarios, but the main mapping flow does not currently consume it.</tspan>
  </text>

  <path class="arrow" d="M350 1215 L390 1215" />
  <path class="arrow" d="M650 1215 L690 1215" />
  <path class="arrow" d="M1010 1215 L1050 1215" />
