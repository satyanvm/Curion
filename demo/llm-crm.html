<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambiguous CRM Intake Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #111827;
        background: #f4f5f7;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      header,
      form,
      .result {
        padding: 24px;
        border: 1px solid #d7dbe2;
        border-radius: 8px;
        background: #ffffff;
      }

      header {
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #526071;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 14px;
        font-weight: 700;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #c4c9d3;
        border-radius: 6px;
        background: #ffffff;
      }

      textarea {
        min-height: 104px;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }

      .checkbox-row input {
        width: auto;
      }

      button {
        margin-top: 20px;
        padding: 10px 16px;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        background: #111827;
        cursor: pointer;
      }

      .result {
        display: none;
        margin-top: 20px;
      }

      .result.visible {
        display: block;
      }

      pre {
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Ambiguous CRM Intake</h1>
        <p>
          The first two fields are intentionally odd so the mapper has to lean on the LLM
          fallback. The rest of the form is a normal CRM intake layout.
        </p>
      </header>

      <form id="llm-crm-form">
        <div class="grid">
          <div class="field">
            <label for="bestInbox">Best inbox</label>
            <input id="bestInbox" name="best_inbox" type="text" />
          </div>

          <div class="field">
            <label for="primaryLine">Primary line</label>
            <input id="primaryLine" name="primary_line" type="text" />
          </div>

          <div class="field">
            <label for="organization">Organization</label>
            <input id="organization" name="organization" type="text" />
          </div>

          <div class="field">
            <label for="currentSeat">Current seat</label>
            <input id="currentSeat" name="current_seat" type="text" />
          </div>

          <div class="field">
            <label for="base">Base</label>
            <input id="base" name="base" type="text" />
          </div>

          <div class="field">
            <label for="market">Market</label>
            <input id="market" name="market" type="text" />
          </div>

          <div class="field">
            <label for="territory">Territory</label>
            <input id="territory" name="territory" type="text" />
          </div>

          <div class="field">
            <label for="zone">Zone</label>
            <input id="zone" name="zone" type="text" />
          </div>

          <div class="field">
            <label for="geo">Geo</label>
            <select id="geo" name="geo">
              <option value="">Select geo</option>
              <option value="Australia">Australia</option>
              <option value="Canada">Canada</option>
              <option value="India">India</option>
              <option value="United States">United States</option>
            </select>
          </div>

          <div class="field">
            <label for="profile">Profile</label>
            <input id="profile" name="profile" type="url" />
          </div>

          <div class="field">
            <label for="source">Source</label>
            <input id="source" name="source" type="url" />
          </div>

          <div class="field">
            <label for="nextTouch">Next touch</label>
            <select id="nextTouch" name="next_touch">
              <option value="">Select channel</option>
              <option value="Email">Email</option>
              <option value="Phone">Phone</option>
              <option value="WhatsApp">WhatsApp</option>
            </select>
          </div>
        </div>

        <div class="field" style="margin-top: 16px;">
          <label for="context">Context</label>
          <textarea id="context" name="context"></textarea>
        </div>

        <div class="checkbox-row">
          <input id="okToProceed" name="ok_to_proceed" type="checkbox" value="yes" />
          <label for="okToProceed">OK to proceed</label>
        </div>

        <button type="submit">Submit Lead</button>
      </form>

      <section id="result" class="result" aria-live="polite">
        <pre id="resultData"></pre>
      </section>
    </main>

    <script>
      const form = document.getElementById("llm-crm-form");
      const result = document.getElementById("result");
      const resultData = document.getElementById("resultData");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const payload = {};

        for (const [key, value] of data.entries()) {
          payload[key] = value;
        }

        if (!data.has("ok_to_proceed")) {
          payload.ok_to_proceed = false;
        }

        resultData.textContent = JSON.stringify(payload, null, 2);
        result.classList.add("visible");
      });
    </script>
  </body>
</html>
