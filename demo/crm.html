<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Lead Intake Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #111827;
        background: #f5f5f5;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      form,
      .result {
        padding: 24px;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #525252;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 14px;
        font-weight: 700;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #bdbdbd;
        border-radius: 6px;
        background: #ffffff;
      }

      textarea {
        min-height: 96px;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }

      .checkbox-row input {
        width: auto;
      }

      button {
        margin-top: 20px;
        padding: 10px 16px;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        background: #111827;
        cursor: pointer;
      }

      .result {
        display: none;
        margin-top: 20px;
      }

      .result.visible {
        display: block;
      }

      pre {
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CRM Lead Intake</h1>
      <p>A local CRM-style form for testing backend extraction, mapping, and fill behavior.</p>

      <form id="crm-form">
        <div class="grid">
          <div class="field">
            <label for="primaryContact">Primary Contact</label>
            <input id="primaryContact" name="primary_contact" type="text" autocomplete="name" />
          </div>

          <div class="field">
            <label for="inbox">Inbox</label>
            <input id="inbox" name="inbox" type="email" autocomplete="email" />
          </div>

          <div class="field">
            <label for="line">Line</label>
            <input id="line" name="line" type="tel" autocomplete="tel" />
          </div>

          <div class="field">
            <label for="account">Account</label>
            <input id="account" name="account" type="text" />
          </div>

          <div class="field">
            <label for="seat">Seat</label>
            <input id="seat" name="seat" type="text" />
          </div>

          <div class="field">
            <label for="base">Base</label>
            <input id="base" name="base" type="text" autocomplete="street-address" />
          </div>

          <div class="field">
            <label for="market">Market</label>
            <input id="market" name="market" type="text" autocomplete="address-level2" />
          </div>

          <div class="field">
            <label for="territory">Territory</label>
            <input id="territory" name="territory" type="text" autocomplete="address-level1" />
          </div>

          <div class="field">
            <label for="zone">Zone</label>
            <input id="zone" name="zone" type="text" autocomplete="postal-code" />
          </div>

          <div class="field">
            <label for="geo">Geo</label>
            <select id="geo" name="geo" autocomplete="country-name">
              <option value="">Select geo</option>
              <option value="Australia">Australia</option>
              <option value="Canada">Canada</option>
              <option value="India">India</option>
              <option value="United States">United States</option>
            </select>
          </div>

          <div class="field">
            <label for="profile">Profile</label>
            <input id="profile" name="profile" type="url" />
          </div>

          <div class="field">
            <label for="source">Source</label>
            <input id="source" name="source" type="url" />
          </div>

          <div class="field">
            <label for="nextTouch">Next Touch</label>
            <select id="nextTouch" name="next_touch">
              <option value="">Select channel</option>
              <option value="Email">Email</option>
              <option value="Phone">Phone</option>
              <option value="WhatsApp">WhatsApp</option>
            </select>
          </div>
        </div>

        <div class="field" style="margin-top: 16px;">
          <label for="context">Context</label>
          <textarea id="context" name="context"></textarea>
        </div>

        <div class="checkbox-row">
          <input id="okToProceed" name="ok_to_proceed" type="checkbox" value="yes" />
          <label for="okToProceed">OK to proceed</label>
        </div>

        <button type="submit">Submit Lead</button>
      </form>

      <section id="result" class="result" aria-live="polite">
        <pre id="resultData"></pre>
      </section>
    </main>

    <script>
      const form = document.getElementById("crm-form");
      const result = document.getElementById("result");
      const resultData = document.getElementById("resultData");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const payload = {};

        for (const [key, value] of data.entries()) {
          payload[key] = value;
        }

        if (!data.has("contact_consent")) {
          payload.contact_consent = false;
        }

        resultData.textContent = JSON.stringify(payload, null, 2);
        result.classList.add("visible");
      });
    </script>
  </body>
</html>
