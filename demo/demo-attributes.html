<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Different Attributes</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: #eef4f2;
        color: #1f2937;
      }

      .wrap {
        max-width: 880px;
        margin: 0 auto;
        padding: 36px 20px 56px;
      }

      .panel {
        padding: 24px;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 12px 32px rgba(31, 41, 55, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-weight: 700;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #c8d0d9;
        border-radius: 12px;
      }

      textarea {
        min-height: 110px;
      }

      .result {
        display: none;
        margin-top: 20px;
        padding: 18px;
        border-radius: 16px;
        background: #dcefe4;
      }

      .result.visible {
        display: block;
      }

      button {
        margin-top: 14px;
        padding: 12px 18px;
        border: 0;
        border-radius: 999px;
        background: #0f766e;
        color: #fff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>Different Attribute Names Demo</h1>
        <p>This form keeps labels readable, but the underlying attributes use awkward names.</p>

        <form id="demo-form">
          <div class="grid">
            <div class="field">
              <label for="candidateLegalName">Candidate Legal Name</label>
              <input id="candidateLegalName" name="candidate_full_name" data-testid="candidate-name" type="text" />
            </div>

            <div class="field">
              <label for="contactMailbox">Reply-To Email</label>
              <input id="contactMailbox" name="reply_to_mailbox" data-testid="reply-mail" type="email" />
            </div>

            <div class="field">
              <label for="smsLine">Cell Number</label>
              <input id="smsLine" name="primary_sms_line" data-testid="sms-line" type="tel" />
            </div>

            <div class="field">
              <label for="employerRecord">Employer / Organization</label>
              <input id="employerRecord" name="employer_record" type="text" />
            </div>

            <div class="field">
              <label for="presentPosition">Designation</label>
              <input id="presentPosition" name="position_now" type="text" />
            </div>

            <div class="field">
              <label for="residenceLine">Residence Line 1</label>
              <input id="residenceLine" name="residence_line_1" type="text" />
            </div>

            <div class="field">
              <label for="municipality">Municipality</label>
              <input id="municipality" name="municipality_name" type="text" />
            </div>

            <div class="field">
              <label for="provinceName">Province / Region</label>
              <input id="provinceName" name="province_region" type="text" />
            </div>

            <div class="field">
              <label for="postalEntry">Postcode Value</label>
              <input id="postalEntry" name="postcode_value" type="text" />
            </div>

            <div class="field">
              <label for="nationResidence">Citizenship / Residence</label>
              <select id="nationResidence" name="geo_region">
                <option value="">Choose one</option>
                <option value="Australia">Australia</option>
                <option value="Canada">Canada</option>
                <option value="India">India</option>
                <option value="Japan">Japan</option>
              </select>
            </div>

            <div class="field">
              <label for="socialLinkedIn">LinkedIn URL</label>
              <input id="socialLinkedIn" name="social_linkedin_url" type="url" />
            </div>

            <div class="field">
              <label for="sitePortfolio">Homepage / Portfolio</label>
              <input id="sitePortfolio" name="homepage_portfolio" type="url" />
            </div>

            <div class="field">
              <label for="channelPref">Preferred Channel</label>
              <select id="channelPref" name="reachPreference">
                <option value="">Choose one</option>
                <option value="Email">Email</option>
                <option value="Phone">Phone</option>
                <option value="WhatsApp">WhatsApp</option>
              </select>
            </div>
          </div>

          <div class="field" style="margin-top: 16px;">
            <label for="memoArea">Additional Info</label>
            <textarea id="memoArea" name="freeform_memo"></textarea>
          </div>

          <div style="margin-top: 12px;">
            <label for="policyConsent">Consent to terms</label>
            <input id="policyConsent" name="consent_flag" type="checkbox" />
          </div>

          <button type="submit">Submit Application</button>
        </form>

        <section id="result" class="result" aria-live="polite">
          <pre id="resultData"></pre>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("demo-form");
      const result = document.getElementById("result");
      const resultData = document.getElementById("resultData");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const payload = {};
        for (const [key, value] of data.entries()) payload[key] = value;
        if (!data.has("consent_flag")) payload.consent_flag = false;
        resultData.textContent = JSON.stringify(payload, null, 2);
        result.classList.add("visible");
      });
    </script>
  </body>
</html>
