<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Dropdowns</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: #f7f4ed;
        color: #1f2937;
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 36px 20px 56px;
      }

      .panel {
        padding: 24px;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 12px 32px rgba(31, 41, 55, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-weight: 700;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #c8d0d9;
        border-radius: 12px;
      }

      .result {
        display: none;
        margin-top: 20px;
        padding: 18px;
        border-radius: 16px;
        background: #dcefe4;
      }

      .result.visible {
        display: block;
      }

      button {
        margin-top: 14px;
        padding: 12px 18px;
        border: 0;
        border-radius: 999px;
        background: #0f766e;
        color: #fff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>Dropdown-Focused Demo</h1>
        <p>This form emphasizes select elements with varied labels and option text.</p>

        <form id="demo-form">
          <div class="grid">
            <div class="field">
              <label for="nationResidence">Nation of Residence</label>
              <select id="nationResidence" name="geo_region">
                <option value="">Choose one</option>
                <option value="Australia">Australia</option>
                <option value="Canada">Canada</option>
                <option value="India">India</option>
                <option value="Japan">Japan</option>
              </select>
            </div>

            <div class="field">
              <label for="reachMethod">How should we reach you?</label>
              <select id="reachMethod" name="reach_channel">
                <option value="">Pick one</option>
                <option value="Email">Email</option>
                <option value="Phone">Phone</option>
                <option value="WhatsApp">WhatsApp</option>
              </select>
            </div>

            <div class="field">
              <label for="applicantName">Applicant Name</label>
              <input id="applicantName" name="candidate_name" type="text" />
            </div>

            <div class="field">
              <label for="contactEmail">Contact Email</label>
              <input id="contactEmail" name="reply_to" type="email" />
            </div>

            <div class="field">
              <label for="contactPhone">WhatsApp Number</label>
              <input id="contactPhone" name="contact_cell" type="tel" />
            </div>

            <div class="field">
              <label for="aboutText">About You</label>
              <textarea id="aboutText" name="freeform"></textarea>
            </div>
          </div>

          <button type="submit">Submit Application</button>
        </form>

        <section id="result" class="result" aria-live="polite">
          <pre id="resultData"></pre>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("demo-form");
      const result = document.getElementById("result");
      const resultData = document.getElementById("resultData");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const payload = {};
        for (const [key, value] of data.entries()) payload[key] = value;
        resultData.textContent = JSON.stringify(payload, null, 2);
        result.classList.add("visible");
      });
    </script>
  </body>
</html>
