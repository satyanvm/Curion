<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curion Extension Test Form</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --ink: #0b0b0b;
        --muted: #666666;
        --line: #dddddd;
        --surface: #f7f7f7;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 40px auto;
      }

      header {
        margin-bottom: 24px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
      }

      p {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
      }

      input,
      select {
        height: 42px;
        padding: 0 11px;
      }

      textarea {
        min-height: 104px;
        padding: 11px;
        resize: vertical;
      }

      .wide,
      .actions {
        grid-column: 1 / -1;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--ink);
        border-radius: 7px;
        background: var(--ink);
        color: #ffffff;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
      }

      @media (max-width: 700px) {
        form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Curion Extension Test Form</h1>
        <p>
          This form includes fields Curion should fill from your profile, plus a few fields it
          should skip if that metadata is missing.
        </p>
      </header>

      <form>
        <label>
          Full name
          <input name="fullName" autocomplete="name" />
        </label>

        <label>
          Email address
          <input name="email" type="email" autocomplete="email" />
        </label>

        <label>
          Phone number
          <input name="phone" type="tel" autocomplete="tel" />
        </label>

        <label>
          Company
          <input name="company" autocomplete="organization" />
        </label>

        <label>
          Job title
          <input name="jobTitle" />
        </label>

        <label>
          LinkedIn profile
          <input name="linkedin" type="url" />
        </label>

        <label>
          City
          <input name="city" autocomplete="address-level2" />
        </label>

        <label>
          Country
          <select name="country">
            <option value="">Select country</option>
            <option>India</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>Canada</option>
          </select>
        </label>

        <label>
          Mother's name
          <input name="motherName" />
        </label>

        <label>
          Emergency contact
          <input name="emergencyContact" />
        </label>

        <label class="wide">
          Notes or message
          <textarea name="message"></textarea>
        </label>

        <label class="wide">
          <span>
            <input name="acceptTerms" type="checkbox" />
            I agree to the terms
          </span>
        </label>

        <div class="actions">
          <button type="button">Demo submit</button>
        </div>
      </form>
    </main>
  </body>
</html>
